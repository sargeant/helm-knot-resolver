name: CI

on:
  pull_request:
    paths:
      - "charts/knot-resolver/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Lint chart
        run: ct lint --config ct.yaml

  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests
        run: |
          for f in charts/knot-resolver/ci/*.yaml; do
            echo "--- Validating with $f ---"
            helm template test-release charts/knot-resolver -f "$f" --set service.clusterIP=10.96.0.53 \
              | kubeconform -strict -summary -ignore-missing-schemas -kubernetes-version 1.30.0
          done

  trivy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: charts/knot-resolver
          exit-code: "1"
          severity: MEDIUM,HIGH,CRITICAL
          trivy-config: charts/knot-resolver/trivy.yaml
          trivyignores: charts/knot-resolver/.trivyignore

  install:
    runs-on: ubuntu-latest
    needs: [lint, kubeconform, trivy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Install chart
        run: ct install --config ct.yaml
