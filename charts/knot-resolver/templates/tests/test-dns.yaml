apiVersion: v1
kind: Pod
metadata:
  name: {{ include "knot-resolver.fullname" . }}-test-dns
  labels:
    {{- include "knot-resolver.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: dns-resolve
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      command: ["nslookup", "example.com", {{ printf "%s.%s.svc.cluster.local" (include "knot-resolver.fullname" .) .Release.Namespace | quote }}]
    - name: dnssec-validate
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
      command: ["sh", "-c", {{ printf "! nslookup dnssec-failed.org %s.%s.svc.cluster.local" (include "knot-resolver.fullname" .) .Release.Namespace | quote }}]
