apiVersion: v1
kind: Pod
metadata:
  name: {{ include "knot-resolver.fullname" . }}-test-dns
  labels:
    {{- include "knot-resolver.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  dnsPolicy: "None"
  dnsConfig:
    nameservers:
      {{- if .Values.service.clusterIP }}
      - {{ .Values.service.clusterIP | quote }}
      {{- else }}
      {{- $svc := (lookup "v1" "Service" .Release.Namespace (include "knot-resolver.fullname" .)) }}
      {{- if $svc }}
      - {{ $svc.spec.clusterIP | quote }}
      {{- else }}
      {{- fail "helm test requires service.clusterIP to be set or the Service to already exist" }}
      {{- end }}
      {{- end }}
    searches:
      - {{ .Release.Namespace }}.svc.cluster.local
      - svc.cluster.local
      - cluster.local
  containers:
    - name: dns-resolve
      image: busybox:1.36
      command: ["nslookup", "example.com"]
    - name: dnssec-validate
      image: busybox:1.36
      command: ["sh", "-c", "! nslookup dnssec-failed.org"]
